services:
  - type: web
    name: qr-vault
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BASE_URL
        value: https://qr-vault.onrender.com   # ← change to YOUR render URL
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
